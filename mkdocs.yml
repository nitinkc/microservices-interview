site_name: Microservices Interview Guide
site_description: A progressive interview preparation guide covering microservices architecture, resilience patterns, service communication, observability, and distributed systems design.
site_author: Nitin Chaurasia
docs_dir: docs
repo_url:  https://github.com/nitinkc/microservices-interview


theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
#    - toc.integrate
    - content.code.copy
    - search
    - search.highlight
    - search.suggest

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - abbr
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - js/mermaid-init.js
  - js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - js/theme-toggle.js
  - js/abbr-tooltip.js

extra_css:
  - css/extra.css

nav:
  - Home: index.md

  - "Microservices Fundamentals":
    - "01 · Resilience & Fault Tolerance": interview/01-microservices-resilience.md
    - "02 · Service Communication": interview/02-service-communication.md

  - "Microservices Scalability & Data":
    - "03 · Performance & Scalability": interview/03-performance-scalability.md
    - "04 · Data Consistency & Idempotency": interview/04-data-consistency.md

  - "Microservices Operations":
    - "05 · Observability & Debugging": interview/05-observability.md
    - "06 · Deployment & Compatibility": interview/06-deployment-compatibility.md

  - "Microservices Architect Level":
    - "07 · Advanced Patterns": interview/07-advanced-patterns.md
    - "08 · Security & Resilience4j": interview/08-security.md
    - "09 · Spring Cloud & Frameworks": interview/09-spring-cloud.md
    - "10 · Containers & Kubernetes": interview/10-kubernetes-containers.md
    - "11 · Architecture & Design Patterns": interview/11-architecture-patterns.md
    - "12 · CI/CD & Team Leadership": interview/12-cicd-team.md

  - "Java & Spring Boot":
    - "13 · Java Core Anti-Cheat": interview/13-java-core-anti-cheat.md
    - "14 · Java 21 Design Patterns": interview/14-java21-design-patterns.md
    - "15 · Spring Boot Microservices Basics": interview/15-spring-boot-microservices-basics.md
    - "16 · Spring Boot Anti-Cheat": interview/16-spring-boot-anti-cheat.md
    - "17 · Spring Boot Architecture Blueprint": interview/17-spring-boot-architecture-blueprint.md

  - "Master Scenario Pack":
    - "18 · Microservices Critical Thinking": interview/18-microservices-critical-thinking.md

